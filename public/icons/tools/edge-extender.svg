  <path d="M6 14 L22 8 L28 22 L20 34 L6 30 Z" fill="currentColor" fill-opacity="0.12" />
  <!-- Right polygon -->
  <path d="M40 12 L56 18 L58 34 L46 40 L36 28 Z" fill="currentColor" fill-opacity="0.12" />
  <!-- Bottom polygon to imply a wider mesh -->
